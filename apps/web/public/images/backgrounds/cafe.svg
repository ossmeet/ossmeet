<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="cafwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#d7ccc8"/>
    </linearGradient>
    <radialGradient id="caflight" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d7ccc8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="caffloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#cafwall)"/>
  <rect width="1920" height="1080" fill="url(#caflight)"/>
  <!-- Floor -->
  <rect x="0" y="750" width="1920" height="330" fill="url(#caffloor)"/>
  <line x1="0" y1="750" x2="1920" y2="750" stroke="#a1887f" stroke-width="2"/>
  <!-- Large window -->
  <rect x="100" y="100" width="700" height="550" rx="12" fill="#b3e5fc" opacity="0.4" stroke="#a1887f" stroke-width="10"/>
  <line x1="450" y1="100" x2="450" y2="650" stroke="#a1887f" stroke-width="5"/>
  <line x1="100" y1="375" x2="800" y2="375" stroke="#a1887f" stroke-width="5"/>
  <!-- Trees outside window -->
  <circle cx="250" cy="300" r="80" fill="#81c784" opacity="0.4"/>
  <circle cx="350" cy="280" r="60" fill="#66bb6a" opacity="0.35"/>
  <circle cx="600" cy="310" r="70" fill="#81c784" opacity="0.3"/>
  <!-- Pendant lights -->
  <line x1="900" y1="0" x2="900" y2="120" stroke="#5d4037" stroke-width="2"/>
  <ellipse cx="900" cy="140" rx="50" ry="25" fill="#ffcc80" opacity="0.7"/>
  <circle cx="900" cy="130" r="30" fill="#fff8e1" opacity="0.3"/>
  <line x1="1200" y1="0" x2="1200" y2="100" stroke="#5d4037" stroke-width="2"/>
  <ellipse cx="1200" cy="120" rx="50" ry="25" fill="#ffcc80" opacity="0.7"/>
  <circle cx="1200" cy="110" r="30" fill="#fff8e1" opacity="0.3"/>
  <line x1="1500" y1="0" x2="1500" y2="130" stroke="#5d4037" stroke-width="2"/>
  <ellipse cx="1500" cy="150" rx="50" ry="25" fill="#ffcc80" opacity="0.7"/>
  <circle cx="1500" cy="140" r="30" fill="#fff8e1" opacity="0.3"/>
  <!-- Shelf on right wall -->
  <rect x="1400" y="200" width="350" height="10" fill="#6d4c41" rx="2"/>
  <rect x="1400" y="350" width="350" height="10" fill="#6d4c41" rx="2"/>
  <!-- Coffee cups/items on shelf -->
  <rect x="1420" y="170" width="20" height="28" fill="#bcaaa4" rx="3"/>
  <rect x="1460" y="175" width="18" height="23" fill="#a1887f" rx="3"/>
  <rect x="1500" y="168" width="22" height="30" fill="#8d6e63" rx="3"/>
  <rect x="1540" y="172" width="20" height="26" fill="#bcaaa4" rx="3"/>
  <rect x="1420" y="318" width="20" height="30" fill="#d7ccc8" rx="3"/>
  <rect x="1460" y="322" width="18" height="26" fill="#bcaaa4" rx="3"/>
  <rect x="1500" y="316" width="22" height="32" fill="#a1887f" rx="3"/>
  <!-- Counter -->
  <rect x="850" y="620" width="600" height="130" rx="6" fill="#5d4037"/>
  <rect x="850" y="610" width="600" height="16" rx="4" fill="#6d4c41"/>
  <!-- Espresso machine -->
  <rect x="920" y="540" width="80" height="70" rx="6" fill="#424242"/>
  <rect x="930" y="550" width="25" height="20" rx="2" fill="#616161"/>
  <rect x="960" y="550" width="25" height="20" rx="2" fill="#616161"/>
  <!-- Menu board -->
  <rect x="1580" y="250" width="180" height="120" rx="6" fill="#3e2723"/>
  <rect x="1595" y="270" width="100" height="6" rx="2" fill="#efebe9" opacity="0.5"/>
  <rect x="1595" y="290" width="80" height="6" rx="2" fill="#efebe9" opacity="0.4"/>
  <rect x="1595" y="310" width="90" height="6" rx="2" fill="#efebe9" opacity="0.4"/>
  <rect x="1595" y="330" width="70" height="6" rx="2" fill="#efebe9" opacity="0.3"/>
</svg>
