<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="crwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="60%" stop-color="#4e342e"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <radialGradient id="crlamp" cx="75%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#ffcc80" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4e342e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crfloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <radialGradient id="crfire" cx="25%" cy="70%" r="25%">
      <stop offset="0%" stop-color="#ff6f00" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#bf360c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3e2723" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#crwall)"/>
  <rect width="1920" height="1080" fill="url(#crlamp)"/>
  <rect width="1920" height="1080" fill="url(#crfire)"/>
  <!-- Floor -->
  <rect x="0" y="780" width="1920" height="300" fill="url(#crfloor)"/>
  <line x1="0" y1="780" x2="1920" y2="780" stroke="#8d6e63" stroke-width="2"/>
  <!-- Fireplace -->
  <rect x="250" y="350" width="350" height="430" rx="10" fill="#3e2723" stroke="#6d4c41" stroke-width="6"/>
  <rect x="280" y="380" width="290" height="340" rx="6" fill="#1a1a1a"/>
  <!-- Fire -->
  <ellipse cx="425" cy="650" rx="80" ry="50" fill="#ff6f00" opacity="0.6"/>
  <ellipse cx="425" cy="640" rx="60" ry="40" fill="#ffab00" opacity="0.5"/>
  <ellipse cx="425" cy="630" rx="35" ry="30" fill="#fff176" opacity="0.4"/>
  <!-- Mantle -->
  <rect x="230" y="340" width="390" height="18" rx="4" fill="#6d4c41"/>
  <!-- Window -->
  <rect x="1150" y="180" width="400" height="350" rx="8" fill="#1a237e" opacity="0.4" stroke="#8d6e63" stroke-width="8"/>
  <rect x="1150" y="180" width="400" height="350" rx="8" fill="#0d47a1" opacity="0.2"/>
  <line x1="1350" y1="180" x2="1350" y2="530" stroke="#8d6e63" stroke-width="4"/>
  <line x1="1150" y1="355" x2="1550" y2="355" stroke="#8d6e63" stroke-width="4"/>
  <!-- Moon in window -->
  <circle cx="1450" cy="280" r="40" fill="#fff9c4" opacity="0.6"/>
  <!-- Bookshelf right -->
  <rect x="1650" y="250" width="200" height="530" rx="4" fill="#5d4037" opacity="0.6"/>
  <rect x="1650" y="250" width="200" height="10" fill="#6d4c41"/>
  <rect x="1650" y="420" width="200" height="10" fill="#6d4c41"/>
  <rect x="1650" y="590" width="200" height="10" fill="#6d4c41"/>
  <!-- Books on shelf -->
  <rect x="1665" y="265" width="20" height="150" fill="#c62828" rx="1"/>
  <rect x="1690" y="270" width="16" height="145" fill="#1565c0" rx="1"/>
  <rect x="1711" y="262" width="22" height="153" fill="#2e7d32" rx="1"/>
  <rect x="1738" y="268" width="18" height="147" fill="#6a1b9a" rx="1"/>
  <rect x="1761" y="264" width="20" height="151" fill="#e65100" rx="1"/>
  <rect x="1665" y="432" width="18" height="153" fill="#0d47a1" rx="1"/>
  <rect x="1688" y="438" width="22" height="147" fill="#880e4f" rx="1"/>
  <rect x="1715" y="430" width="16" height="155" fill="#006064" rx="1"/>
  <rect x="1736" y="436" width="20" height="149" fill="#f9a825" rx="1"/>
  <!-- Rug -->
  <ellipse cx="960" cy="850" rx="500" ry="80" fill="#8d6e63" opacity="0.3"/>
  <ellipse cx="960" cy="850" rx="420" ry="60" fill="#a1887f" opacity="0.2"/>
</svg>
