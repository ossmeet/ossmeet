# OSSMeet VPS Kernel Tuning for LiveKit + Whiteboard
# Applied 2026-03-28

# --- UDP socket buffers (critical for WebRTC / LiveKit) ---
# Default: 212992 (208KB). Raised to 25MB.
# WebRTC sends hundreds of RTP packets/sec per participant.
# Small buffers cause silent packet drops -> video freezes, audio glitches.
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 26214400
net.core.wmem_default = 26214400

# --- Connection backlog ---
# Default: somaxconn=4096, syn_backlog=1024, netdev_backlog=1000
# Raised to handle burst connections (e.g. 20 people joining a meeting at once).
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# --- TIME_WAIT recycling ---
# Default: fin_timeout=60, tw_reuse=2
# Faster cleanup of closed sockets so ports are available for new connections.
# Important under heavy WebSocket churn (users joining/leaving meetings).
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# --- TCP keepalive (detects dead WebSocket connections) ---
# Default: keepalive_time=7200 (2 hours!)
# Without this, a crashed/sleeping client holds server resources for hours.
# Whiteboard rooms won't clean up, LiveKit rooms won't close.
# Now: probe after 5 min idle, every 30 sec, drop after 3 failed probes.
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 3

# --- Ephemeral port range ---
# Default: 32768-60999 (~28K ports)
# Widened to maximize concurrent connections.
net.ipv4.ip_local_port_range = 1024 65535

# --- System-wide file descriptor limit ---
# LiveKit load-test docs explicitly recommend this.
# Ensures enough FDs for many concurrent WebRTC + WebSocket connections.
fs.file-max = 2097152

# --- BBR congestion control ---
# Better throughput than default cubic for ICE/TCP fallback and WebSocket
# signaling. Module tcp_bbr must be loaded (available on kernel 4.9+).
net.ipv4.tcp_congestion_control = bbr
