bind 0.0.0.0
port 6379
# Enable protected mode as defense-in-depth (bind 0.0.0.0 needed for Docker DNS)
protected-mode yes
# Password is now set via REDIS_PASSWORD env var in docker-compose.yaml.
# Redis 7+ supports environment variable references in config (not shell expansion).
# The password is injected at startup via the entrypoint wrapper.
